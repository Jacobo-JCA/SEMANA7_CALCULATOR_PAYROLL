server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/auth/**

        - id: employee-service
          uri: ${EMPLOYEE_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/employees/**
          filters:
            - AuthenticationFilter

        - id: payroll-service
          uri: ${PAYROLL_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/payroll/**
          filters:
            - AuthenticationFilter
internal:
  signature:
    secret: ${SECRET_KEY}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${EXPERITION_TIME}
