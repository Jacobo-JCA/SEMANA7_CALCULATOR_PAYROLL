server:
  port: 8081
spring:
  application:
    name: employee-service
  datasource:
    url: jdbc:postgresql://localhost:5432/employee_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
  web:
    resources:
      add-mappings: false

internal:
  signature:
    secret: ${SECRET_KEY}

logging:
  level:
    root: INFO
    com.sofkau: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

rabbitmq:
  exchange:
    employee: employee.exchange
  queue:
    employee:
      created: employee.created.queue
      updated: employee.updated.queue
  routing:
    key:
      employee:
        created: employee.created.key
        updated: employee.updated.key
